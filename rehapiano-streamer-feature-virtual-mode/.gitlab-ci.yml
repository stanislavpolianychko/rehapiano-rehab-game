stages:
  - build
  - release

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"
  # Harbor registry
  HARBOR_REGISTRY: "harbor.rehapiano.com"
  HARBOR_PROJECT: "rehapiano-device"
  IMAGE_NAME: "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/rehapiano-streamer"
  DEFAULT_BRANCH: "main"

services:
  - name: docker:24-dind
    alias: docker

build:
  stage: build
  image: docker:24
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USER" --password-stdin "$HARBOR_REGISTRY"
  script:
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
  only:
    - branches
  except:
    - tags

release_latest:
  stage: release
  image: docker:24
  needs: ["build"]
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USER" --password-stdin "$HARBOR_REGISTRY"
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "$DEFAULT_BRANCH" ]; then
        docker pull "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
        docker tag "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$IMAGE_NAME:latest"
        docker push "$IMAGE_NAME:latest"
      else
        echo "Skipping latest tag for branch $CI_COMMIT_BRANCH"
      fi
  only:
    - branches
  except:
    - tags

release_tag:
  stage: release
  image: docker:24
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USER" --password-stdin "$HARBOR_REGISTRY"
  script:
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_TAG" .
    - docker push "$IMAGE_NAME:$CI_COMMIT_TAG"
  only:
    - tags
