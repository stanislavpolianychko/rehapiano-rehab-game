# =============================================================================
# Balance Trainer - GitLab CI/CD Pipeline
# =============================================================================
# Required CI/CD Variables (Settings -> CI/CD -> Variables):
#   - HARBOR_REGISTRY: Harbor registry URL (e.g., harbor.rehapiano.com)
#   - HARBOR_PROJECT: Harbor project name
#   - HARBOR_USER: Harbor username for pushing images
#   - HARBOR_PASSWORD: Harbor password/token
#   - REGISTRY_PROXY: Docker Hub proxy path (e.g., harbor.rehapiano.com/proxy-dockerhub/library)
# =============================================================================

stages:
  - build
  - release

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_BUILDKIT: "0"
  IMAGE_NAME: "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/balance-trainer"

services:
  - name: docker:24-dind
    alias: docker

# =============================================================================
# Build Stage
# =============================================================================
build:docker:
  stage: build
  image: docker:24
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USER" --password-stdin "$HARBOR_REGISTRY"
  script:
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_TAG == null

# =============================================================================
# Release Stage - Latest (main branch only)
# =============================================================================
release:latest:
  stage: release
  image: docker:24
  needs: ["build:docker"]
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USER" --password-stdin "$HARBOR_REGISTRY"
  script:
    - docker pull "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - docker tag "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# Release Stage - Tag
# =============================================================================
release:tag:
  stage: release
  image: docker:24
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USER" --password-stdin "$HARBOR_REGISTRY"
  script:
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_TAG" .
    - docker push "$IMAGE_NAME:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
