 # Balance Trainer - Game Configuration
# Version: 1.0.0
#
# This game helps patients practice bilateral coordination
# by balancing force between left and right hands.

config_version: "1.0.0"

game:
  description: |
    Rehabilitačná hra zameraná na bilaterálnu koordináciu.
    Pacient sa snaží vybalancovať silu stláčania medzi
    ľavou a pravou rukou. Vizuálna spätná väzba pomocou
    váhy pomáha pacientovi udržať rovnováhu.

docker:
  resources:
    memory_limit: "128M"
    cpu_limit: "0.3"
  healthcheck:
    path: "/health"
    interval: 30
    timeout: 5

requirements:
  min_firmware_version: "2.31"
  max_firmware_version: null
  min_ram_mb: 128
  min_disk_mb: 20
  requires_imu: false
  requires_tensometers: true
  min_resolution_width: 1024
  min_resolution_height: 768

connection:
  streamer_ws_path: "/ws"
  streamer_ws_port: 5555
  streamer_http_port: 5555
  reconnect_interval_ms: 2000
  max_reconnect_attempts: 0

display:
  refresh_rate_hz: 60
  mode: "real-time"
  theme: "dark"
  default_language: "sk"

# Doctor-configurable parameters
parameters:
  - name: countdown_seconds
    type: integer
    default: 3
    min: 1
    max: 10
    unit: "s"
    doctor_configurable: true
    importance: medium
    description:
      sk: "Dĺžka odpočtu pred začiatkom hry"
      en: "Countdown duration before game starts"

  - name: game_duration_seconds
    type: integer
    default: 60
    min: 30
    max: 300
    unit: "s"
    doctor_configurable: true
    importance: high
    description:
      sk: "Celková dĺžka hry"
      en: "Total game duration"

  - name: balance_threshold
    type: float
    default: 15.0
    min: 5.0
    max: 30.0
    step: 1.0
    unit: "%"
    doctor_configurable: true
    importance: high
    description:
      sk: "Tolerancia pre vyvážený stav (% rozdielu medzi rukami)"
      en: "Tolerance for balanced state (% difference between hands)"

  - name: haptic_feedback
    type: boolean
    default: true
    doctor_configurable: true
    importance: medium
    description:
      sk: "Zapnúť haptickú spätnú väzbu pri dosiahnutí rovnováhy"
      en: "Enable haptic feedback when balance is achieved"

  - name: difficulty
    type: enum
    values: ["easy", "medium", "hard"]
    default: "medium"
    doctor_configurable: true
    importance: high
    description:
      sk: "Obtiažnosť hry (ovplyvňuje prah rovnováhy)"
      en: "Game difficulty (affects balance threshold)"

# Result schema - what the game outputs
result_schema:
  - name: final_score
    type: integer
    required: true
    description: "Final game score"

  - name: balance_time_seconds
    type: float
    required: true
    unit: "s"
    description: "Total time spent in balanced state"

  - name: average_deviation
    type: float
    required: true
    unit: "%"
    description: "Average force deviation between hands"

  - name: max_force_left
    type: float
    required: true
    description: "Maximum force from left hand"

  - name: max_force_right
    type: float
    required: true
    description: "Maximum force from right hand"

  - name: sample_count
    type: integer
    required: true
    description: "Number of sensor samples processed"

  - name: actual_duration_seconds
    type: float
    required: true
    unit: "s"
    description: "Actual game duration"

  - name: recording_id
    type: string
    required: false
    description: "ID of the recorded sensor data"

# Localization
localization:
  sk:
    game_title: "Balance Trainer"
    game_description: "Vybalancujte silu medzi rukami"
    instruction_main: "Stláčajte prsty oboch rúk rovnomerne"
    status_balanced: "VYVÁŽENÉ!"
    status_unbalanced: "NEVYVÁŽENÉ"
    button_start: "Začať hru"
    button_play_again: "Hrať znova"
    label_left_hand: "Ľavá ruka"
    label_right_hand: "Pravá ruka"
    label_score: "Skóre"
    label_balance_time: "Čas v rovnováhe"
    result_excellent: "Výborne!"
    result_good: "Dobre!"
    result_try_again: "Skúste znova"

  en:
    game_title: "Balance Trainer"
    game_description: "Balance the force between your hands"
    instruction_main: "Press fingers on both hands evenly"
    status_balanced: "BALANCED!"
    status_unbalanced: "UNBALANCED"
    button_start: "Start game"
    button_play_again: "Play again"
    label_left_hand: "Left hand"
    label_right_hand: "Right hand"
    label_score: "Score"
    label_balance_time: "Balance time"
    result_excellent: "Excellent!"
    result_good: "Good!"
    result_try_again: "Try again"

accessibility:
  min_touch_target_px: 48
  supports_high_contrast: true
  supports_large_text: true
  color_blind_safe: true
